  .blank {
    color: #007aff;
    font-weight: bold;
    padding: 0 8px;
    border-bottom: 3px solid #007aff;
  }
  /* 选项容器 */
  #options {
    margin: 40px auto;
    display: none;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }
  /* 选项按钮 */
  .option {
    padding: 14px 24px;
    font-size: 24px;
    border: 2px solid #e5e5ea;
    border-radius: 16px;
    background: #f2f2f7;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .option:hover {
    border-color: #007aff;
    background: #e1f5ff;
  }
  .option.correct {
    background: #34c759;
    color: white;
    border-color: #34c759;
  }
  .option.wrong {
    background: #ff3b30;
    color: white;
    border-color: #ff3b30;
  }
  /* 结果提示 */
  #result {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    margin: 20px 0;
    display: none;
  }
  #result.correct { color: #34c759; }
  #result.wrong { color: #ff3b30; }

  /* 译文 */
  #translation {
    margin: 0 auto 20px;
    color: #48484a;
    font-size: 22px;
    line-height: 1.6;
    display: none;
    text-align: center;
    max-width: 85%;
  }
  /* 出处 */
  #source {
    color: #86868b;
    font-size: 18px;
    font-style: italic;
    display: none;
    text-align: center;
    margin-bottom: 60px;
  }
  /* 按钮组：句子右上方 */
  .btn-group {
    position: absolute;
    top: 10vh;
    right: 24px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  /* 按钮：无背景 + 灰色 + 小尺寸 */
  button {
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 400;
    border: none;
    border-radius: 12px;

  button:hover {

  }

  select {

    font-size: 14px;
    border: none;
    border-radius: 12px;
    background: transparent;
    color: #86868b;
    cursor: pointer;

    outline: none;
  }

    color: #007aff;
  }
</style>
</head>

let currentBook = 'all';
let isTestMode = false;
let currentQuote = null;
let correctWord = '';

// 切换书籍
function changeBook() {
  currentBook = document.getElementById('bookSelect').value;
  if (isTestMode) showTest();
  else randomQuote();
}

// 正常阅读模式
function randomQuote() {
  isTestMode = false;
  let filtered = quotes;
  if (currentBook !== 'all') filtered = quotes.filter(q => q[2].includes(currentBook));
  
  const idx = Math.floor(Math.random() * filtered.length);
  const [sen, trans, source] = filtered[idx];
  
  document.getElementById('sentence').innerText = sen;
  document.getElementById('translation').innerText = trans;
  document.getElementById('source').innerText = source;
  
  document.getElementById('translation').style.display = 'none';
  document.getElementById('source').style.display = 'none';
  document.getElementById('options').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

// 挖词测试模式
function showTest() {
  isTestMode = true;
  let filtered = quotes;
  if (currentBook !== 'all') filtered = quotes.filter(q => q[2].includes(currentBook));
  
  const idx = Math.floor(Math.random() * filtered.length);
  currentQuote = filtered[idx];
  const [sentence] = currentQuote;

  // 随机挖一个两字词/关键字
  const words = sentence.match(/[\u4e00-\u9fa5]{2}/g) || [];
  if (words.length < 1) { randomQuote(); return; }
  
  const blankIdx = Math.floor(Math.random() * words.length);
  correctWord = words[blankIdx];
  const blanked = sentence.replace(correctWord, '<span class="blank">　　</span>');
  
  document.getElementById('sentence').innerHTML = blanked;
  document.getElementById('translation').style.display = 'none';
  document.getElementById('source').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  
  // 生成选项：1正确 + 3干扰
  const allWords = [...new Set(quotes.flatMap(q => q[0].match(/[\u4e00-\u9fa5]{2}/g) || []))];
  let options = [correctWord];
  while (options.length < 4) {
    const w = allWords[Math.floor(Math.random() * allWords.length)];
    if (!options.includes(w)) options.push(w);
  }
  options.sort(() => Math.random() - 0.5); // 打乱
  
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  options.forEach(w => {
    const b = document.createElement('div');
    b.className = 'option';
    b.innerText = w;
    b.onclick = () => checkAnswer(w);
    optEl.appendChild(b);
  });
  optEl.style.display = 'flex';
}

// 检查答案
function checkAnswer(select) {
  const opts = document.querySelectorAll('.option');
  const res = document.getElementById('result');
  
  opts.forEach(o => {
    if (o.innerText === correctWord) o.classList.add('correct');
    else o.classList.remove('correct');
    
    if (o.innerText === select && o.innerText !== correctWord) o.classList.add('wrong');
    else o.classList.remove('wrong');
  });
  
  res.style.display = 'block';
  if (select === correctWord) {
    res.innerText = '✅ 回答正确！';
    res.className = 'correct';
    setTimeout(() => showTest(), 1200);
  } else {
    res.innerText = '❌ 再试一次';
    res.className = 'wrong';
  }
}

// 返回阅读
function showNormal() {
  randomQuote();
}

// 显示译文
function showTrans() {
  document.getElementById('translation').style.display = 'block';
}

// 显示出处
function showSource() {
  document.getElementById('source').style.display = 'block';
}

window.onload = randomQuote;
</script>
